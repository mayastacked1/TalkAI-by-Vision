<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TalkAI by Vision</title>
  <style>
    :root {
      --bg-main: #131314;
      --bg-sidebar: #1e1f20;
      --bg-message-user: #2b2a33;
      --bg-message-ai: #1e1f20;
      --text-main: #e3e3e3;
      --accent: #a8c7fa;
      --border: #444746;
      --bg-modal: #28292a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

    /* Layout Structure */
    #sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 12px; }
    #main-chat { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }

    /* New Chat Button */
    .new-chat-btn { background: #2a2b2d; border: 1px solid var(--border); color: var(--text-main); padding: 12px; border-radius: 24px; cursor: pointer; font-weight: 500; margin-bottom: 20px; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .new-chat-btn:hover { background: #37393b; }

    /* History Sidebar List */
    .history-section { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    .history-title-label { font-size: 11px; text-transform: uppercase; color: #80868b; font-weight: 700; margin: 0 8px 8px; }
     
    .history-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: background 0.2s; position: relative; }
    .history-item:hover { background: #2d2e30; }
    .history-item.active { background: #2d2e30; color: var(--accent); }
    .history-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 8px; }
    .history-delete-btn { background: none; border: none; color: #80868b; cursor: pointer; font-size: 16px; opacity: 0; transition: opacity 0.2s, color 0.2s; }
    .history-item:hover .history-delete-btn { opacity: 1; }
    .history-delete-btn:hover { color: #ff6b6b; }

    /* Sidebar Footer Management Tabs */
    .sidebar-footer { border-top: 1px solid var(--border); padding-top: 8px; display: flex; flex-direction: column; gap: 4px; }
    .footer-tab { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; color: #c4c7c5; transition: background 0.2s; }
    .footer-tab:hover { background: #2d2e30; color: var(--text-main); }
    .footer-tab svg { width: 18px; height: 18px; fill: currentColor; }

    /* Messaging Viewport */
    #messagesViewport { flex: 1; overflow-y: auto; padding: 24px 0; display: flex; flex-direction: column; }
    .message-row { display: flex; padding: 20px 15%; width: 100%; animation: fadeIn 0.3s ease-in-out; }
    .message-row.user { background: var(--bg-main); }
    .message-row.assistant { background: var(--bg-message-ai); border-top: 1px solid #28292a; border-bottom: 1px solid #28292a; }
     
    .message-content { max-width: 800px; margin: 0 auto; width: 100%; line-height: 1.6; font-size: 15px; }
    .message-sender { font-weight: 600; font-size: 12px; margin-bottom: 6px; color: #9aa0a6; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Form Input Area */
    .input-container { padding: 20px 15%; background: linear-gradient(transparent, var(--bg-main) 20%); }
    .input-box-wrapper { display: flex; background: #202124; border: 1px solid var(--border); border-radius: 28px; padding: 6px 16px; align-items: center; }
    .input-box-wrapper:focus-within { border-color: #666; }
     
    #chatInput { flex: 1; background: transparent; border: none; color: var(--text-main); font-size: 16px; padding: 10px 0; outline: none; resize: none; max-height: 200px; font-family: inherit; }
    #sendBtn { background: none; border: none; color: var(--accent); cursor: pointer; padding: 8px; font-weight: 600; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { color: #444746; cursor: not-allowed; }

    /* Modal System Layouts */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal-card { background: var(--bg-modal); border: 1px solid var(--border); border-radius: 16px; width: 400px; max-width: 90%; padding: 24px; position: relative; transform: translateY(20px); transition: transform 0.2s ease; }
    .modal-overlay.open .modal-card { transform: translateY(0); }
    
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .modal-title { font-size: 18px; font-weight: 600; color: var(--accent); }
    .modal-close { background: none; border: none; color: #80868b; font-size: 22px; cursor: pointer; }
    .modal-close:hover { color: var(--text-main); }

    /* Leadership Directory Styles */
    .team-list { display: flex; flex-direction: column; gap: 14px; margin-top: 10px; }
    .team-member { display: flex; flex-direction: column; padding: 8px 12px; background: #1e1f20; border-radius: 8px; border-left: 3px solid var(--accent); }
    .member-name { font-weight: 600; font-size: 15px; color: var(--text-main); }
    .member-role { font-size: 12px; color: #9aa0a6; text-transform: uppercase; margin-top: 2px; letter-spacing: 0.5px; }

    /* Minimalist Form Controls for Settings */
    .settings-group { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
    .settings-label { font-size: 12px; color: #9aa0a6; text-transform: uppercase; font-weight: 600; }
    .settings-select { background: #1e1f20; border: 1px solid var(--border); color: var(--text-main); padding: 8px 12px; border-radius: 6px; outline: none; font-size: 14px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <aside id="sidebar">
    <button class="new-chat-btn" onclick="startNewChat()">
      <span>+</span> New Chat
    </button>
    
    <div class="history-title-label">Recent Threads</div>
    <div class="history-section" id="historyList"></div>

    <div class="sidebar-footer">
      <div class="footer-tab" onclick="toggleModal('infoModal', true)">
        <svg viewBox="0 0 24 24"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
        <span>Information</span>
      </div>
      <div class="footer-tab" onclick="toggleModal('settingsModal', true)">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        <span>Settings</span>
      </div>
    </div>
  </aside>

  <main id="main-chat">
    <div id="messagesViewport">
      <div id="messagesInner"></div>
    </div>

    <div class="input-container">
      <div class="input-box-wrapper">
        <textarea id="chatInput" rows="1" placeholder="Ask TalkAI..." onkeydown="handleKeyDown(event)"></textarea>
        <button id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </main>

  <div id="infoModal" class="modal-overlay" onclick="toggleModal('infoModal', false)">
    <div class="modal-card" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title">System Information</div>
        <button class="modal-close" onclick="toggleModal('infoModal', false)">&times;</button>
      </div>
      <div class="team-list">
        <div class="team-member">
          <div class="member-name">Vision</div>
          <div class="member-role">CEO / Owner / Lead Developer</div>
        </div>
        <div class="team-member">
          <div class="member-name">Yuji</div>
          <div class="member-role">COO</div>
        </div>
        <div class="team-member">
          <div class="member-name">Marlon</div>
          <div class="member-role">Lead Developer</div>
        </div>
      </div>
    </div>
  </div>

  <div id="settingsModal" class="modal-overlay" onclick="toggleModal('settingsModal', false)">
    <div class="modal-card" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title">Settings</div>
        <button class="modal-close" onclick="toggleModal('settingsModal', false)">&times;</button>
      </div>
      <div class="settings-group">
        <label class="settings-label">Active Engine</label>
        <select class="settings-select">
          <option>Llama 3.3 70B (Cerebras Ultra-Low Latency)</option>
        </select>
      </div>
      <div class="settings-group" style="margin-top: 16px;">
        <label class="settings-label">Workspace Theme</label>
        <select class="settings-select">
          <option>Vision Dark Core (Default)</option>
        </select>
      </div>
    </div>
  </div>

  <script>
    let messages = [];
    let currentConvoId = null;
    let conversationsDatabase = {};

    window.onload = () => {
      startNewChat();
    };

    function toggleModal(modalId, show) {
      const modal = document.getElementById(modalId);
      if (show) {
        modal.classList.add('open');
      } else {
        modal.classList.remove('open');
      }
    }

    function startNewChat() {
      messages = [];
      currentConvoId = 'convo_' + Date.now();
      document.getElementById('messagesInner').innerHTML = `
        <div class="message-row assistant">
          <div class="message-content">
            <div class="message-sender">TalkAI</div>
            Hello! I am TalkAI, powered by Vision and Cerebras infrastructure. How can I assist you today?
          </div>
        </div>
      `;
      document.querySelectorAll('.history-item').forEach(item => item.classList.remove('active'));
      
      const inputEl = document.getElementById('chatInput');
      inputEl.value = '';
      inputEl.style.height = 'auto';
      inputEl.focus();
    }

    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    async function sendMessage() {
      const inputEl = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');
      const text = inputEl.value.trim();
       
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      inputEl.disabled = true;
      sendBtn.disabled = true;

      messages.push({ role: 'user', content: text });
      appendMessageUI('user', text);
      updateChatHistorySidebar(text);

      const innerContainer = document.getElementById('messagesInner');
      const responseRow = document.createElement('div');
      responseRow.className = 'message-row assistant';
      responseRow.innerHTML = `
        <div class="message-content">
          <div class="message-sender">TalkAI</div>
          <div class="ai-text-target">Thinking...</div>
        </div>
      `;
      innerContainer.appendChild(responseRow);
      scrollToBottom();

      const textTarget = responseRow.querySelector('.ai-text-target');

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: messages })
        });

        if (!response.ok) {
          throw new Error(`Server returned HTTP ${response.status}`);
        }

        const data = await response.json();
        const reply = data.choices[0].message.content;

        messages.push({ role: 'assistant', content: reply });
        textTarget.innerText = reply;

        if (conversationsDatabase[currentConvoId]) {
          conversationsDatabase[currentConvoId].messages = [...messages];
        }

      } catch (err) {
        console.error('Fetch error:', err);
        textTarget.innerHTML = `<span style="color: #ff6b6b;">Error: Failed to process response. Please make sure your server is running.</span>`;
      } finally {
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();
        scrollToBottom();
      }
    }

    function appendMessageUI(role, content) {
      const innerContainer = document.getElementById('messagesInner');
      const row = document.createElement('div');
      row.className = `message-row ${role}`;
       
      row.innerHTML = `
        <div class="message-content">
          <div class="message-sender">${role === 'user' ? 'You' : 'TalkAI'}</div>
          <div>${escapeHtml(content)}</div>
        </div>
      `;
       
      innerContainer.appendChild(row);
      scrollToBottom();
    }

    function updateChatHistorySidebar(firstMsgText) {
      // FIXED: Safely verify existence before mapping deep object trees
      if (conversationsDatabase[currentConvoId]) {
        conversationsDatabase[currentConvoId].messages = [...messages];
        return;
      }

      conversationsDatabase[currentConvoId] = {
        title: firstMsgText,
        messages: [...messages]
      };

      const historyList = document.getElementById('historyList');
      const historyItem = document.createElement('div');
      historyItem.className = 'history-item active';
      historyItem.id = `item_${currentConvoId}`;
       
      historyItem.setAttribute('onclick', `loadSavedConversation('${currentConvoId}')`);

      historyItem.innerHTML = `
        <div class="history-text">${escapeHtml(firstMsgText)}</div>
        <button class="history-delete-btn" onclick="deleteConversation(event, '${currentConvoId}')">×</button>
      `;

      document.querySelectorAll('.history-item').forEach(item => item.classList.remove('active'));
      historyList.insertBefore(historyItem, historyList.firstChild);
    }

    function loadSavedConversation(convoId) {
      if (!conversationsDatabase[convoId]) return;
      currentConvoId = convoId;
      messages = [...conversationsDatabase[convoId].messages];

      document.querySelectorAll('.history-item').forEach(item => item.classList.remove('active'));
      const activeEl = document.getElementById(`item_${convoId}`);
      if (activeEl) activeEl.classList.add('active');

      const innerContainer = document.getElementById('messagesInner');
      innerContainer.innerHTML = '';

      messages.forEach(msg => {
        const row = document.createElement('div');
        row.className = `message-row ${msg.role}`;
        row.innerHTML = `
          <div class="message-content">
            <div class="message-sender">${msg.role === 'user' ? 'You' : 'TalkAI'}</div>
            <div>${escapeHtml(msg.content)}</div>
          </div>
        `;
        innerContainer.appendChild(row);
      });

      const inputEl = document.getElementById('chatInput');
      inputEl.value = '';
      inputEl.style.height = 'auto';
      inputEl.focus();

      scrollToBottom();
    }

    function deleteConversation(event, convoId) {
      event.stopPropagation(); 
      const item = document.getElementById(`item_${convoId}`);
      if (item) {
        item.remove();
        delete conversationsDatabase[convoId];
        if (currentConvoId === convoId) {
          startNewChat();
        }
      }
    }

    function scrollToBottom() {
      const viewport = document.getElementById('messagesViewport');
      viewport.scrollTop = viewport.scrollHeight;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    const tx = document.getElementById('chatInput');
    tx.setAttribute('style', 'height:' + (tx.scrollHeight) + 'px;overflow-y:hidden;');
    tx.addEventListener("input", OnInput, false);
    function OnInput() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    }
  </script>
</body>
</html>
