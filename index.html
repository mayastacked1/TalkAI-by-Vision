<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TalkAI by Vision</title>
  <style>
    :root {
      --bg-main: #131314;
      --bg-sidebar: #1e1f20;
      --bg-message-user: #2b2a33;
      --bg-message-ai: #1e1f20;
      --text-main: #e3e3e3;
      --accent: #a8c7fa;
      --border: #444746;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-main); color: var(--text-main); display: flex; hieght: 100vh; height: 100vh; overflow: hidden; }

    /* Layout Structure */
    #sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 12px; }
    #main-chat { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }

    /* New Chat Button */
    .new-chat-btn { background: #2a2b2d; border: 1px solid var(--border); color: var(--text-main); padding: 12px; border-radius: 24px; cursor: pointer; font-weight: 500; margin-bottom: 20px; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .new-chat-btn:hover { background: #37393b; }

    /* History Sidebar List */
    .history-section { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    .history-title-label { font-size: 11px; text-transform: uppercase; color: #80868b; font-weight: 700; margin: 0 8px 8px; }
    
    .history-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: background 0.2s; position: relative; }
    .history-item:hover { background: #2d2e30; }
    .history-item.active { background: #2d2e30; color: var(--accent); }
    .history-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 8px; }
    .history-delete-btn { background: none; border: none; color: #80868b; cursor: pointer; font-size: 16px; opacity: 0; transition: opacity 0.2s, color 0.2s; }
    .history-item:hover .history-delete-btn { opacity: 1; }
    .history-delete-btn:hover { color: #ff6b6b; }

    /* Messaging Viewport */
    #messagesViewport { flex: 1; overflow-y: auto; padding: 24px 0; display: flex; flex-direction: column; }
    .message-row { display: flex; padding: 20px 15%; width: 100%; animation: fadeIn 0.3s ease-in-out; }
    .message-row.user { background: var(--bg-main); }
    .message-row.assistant { background: var(--bg-message-ai); border-top: 1px solid #28292a; border-bottom: 1px solid #28292a; }
    
    .message-content { max-width: 800px; margin: 0 auto; width: 100%; line-height: 1.6; font-size: 15px; }
    .message-sender { font-weight: 600; font-size: 12px; margin-bottom: 6px; color: #9aa0a6; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Form Input Area */
    .input-container { padding: 20px 15%; background: linear-gradient(transparent, var(--bg-main) 20%); }
    .input-box-wrapper { display: flex; background: #202124; border: 1px solid var(--border); border-radius: 28px; padding: 6px 16px; align-items: center; }
    .input-box-wrapper:focus-within { border-color: #666; }
    
    #chatInput { flex: 1; background: transparent; border: none; color: var(--text-main); font-size: 16px; padding: 10px 0; outline: none; resize: none; max-height: 200px; font-family: inherit; }
    #sendBtn { background: none; border: none; color: var(--accent); cursor: pointer; padding: 8px; font-weight: 600; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { color: #444746; cursor: not-allowed; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <aside id="sidebar">
    <button class="new-chat-btn" onclick="startNewChat()">
      <span>+</span> New Chat
    </button>
    <div class="history-title-label">Recent Threads</div>
    <div class="history-section" id="historyList">
      </div>
  </aside>

  <main id="main-chat">
    <div id="messagesViewport">
      <div id="messagesInner">
        </div>
    </div>

    <div class="input-container">
      <div class="input-box-wrapper">
        <textarea id="chatInput" rows="1" placeholder="Ask TalkAI..." onkeydown="handleKeyDown(event)"></textarea>
        <button id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </main>

  <script>
    let messages = [];
    let currentConvoId = null;
    let conversationsDatabase = {}; // Stores { convoId: { title: string, messages: [] } }

    // On page initialization, establish a base tracking state
    window.onload = () => {
      startNewChat();
    };

    function startNewChat() {
      messages = [];
      currentConvoId = 'convo_' + Date.now();
      document.getElementById('messagesInner').innerHTML = `
        <div class="message-row assistant">
          <div class="message-content">
            <div class="message-sender">TalkAI</div>
            Hello! I am TalkAI, powered by Vision and Cerebras infrastructure. How can I assist you today?
          </div>
        </div>
      `;
      // De-select current active items in sidebar
      document.querySelectorAll('.history-item').forEach(item => item.classList.remove('active'));
      document.getElementById('chatInput').focus();
    }

    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    async function sendMessage() {
      const inputEl = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');
      const text = inputEl.value.trim();
      
      if (!text) return;

      // Reset input layout
      inputEl.value = '';
      inputEl.style.height = 'auto';
      inputEl.disabled = true;
      sendBtn.disabled = true;

      // 1. Append User Message to UI and Memory State
      messages.push({ role: 'user', content: text });
      appendMessageUI('user', text);

      // 2. Structural Sidebar Validation Check
      updateChatHistorySidebar(text);

      // Create placeholders for the assistant response UI
      const innerContainer = document.getElementById('messagesInner');
      const responseRow = document.createElement('div');
      responseRow.className = 'message-row assistant';
      responseRow.innerHTML = `
        <div class="message-content">
          <div class="message-sender">TalkAI</div>
          <div class="ai-text-target">Thinking...</div>
        </div>
      `;
      innerContainer.appendChild(responseRow);
      scrollToBottom();

      const textTarget = responseRow.querySelector('.ai-text-target');

      try {
        // 3. Dispatch data block directly to the server endpoint
        // NOTE: If testing from a separate port, modify path to 'http://localhost:3000/api/chat'
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: messages })
        });

        if (!response.ok) {
          throw new Error(`Server returned HTTP ${response.status}`);
        }

        const data = await response.json();
        const reply = data.choices[0].message.content;

        // 4. Save to Memory state & update actual UI content
        messages.push({ role: 'assistant', content: reply });
        textTarget.innerText = reply;

        // Sync the fully finished response back down into the local tracking object
        conversationsDatabase[currentConvoId].messages = [...messages];

      } catch (err) {
        console.error('Fetch error:', err);
        textTarget.innerHTML = `<span style="color: #ff6b6b;">Error: Failed to process response. Please make sure your server is running.</span>`;
      } finally {
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();
        scrollToBottom();
      }
    }

    function appendMessageUI(role, content) {
      const innerContainer = document.getElementById('messagesInner');
      const row = document.createElement('div');
      row.className = `message-row ${role}`;
      
      row.innerHTML = `
        <div class="message-content">
          <div class="message-sender">${role === 'user' ? 'You' : 'TalkAI'}</div>
          <div>${escapeHtml(content)}</div>
        </div>
      `;
      
      innerContainer.appendChild(row);
      scrollToBottom();
    }

    function updateChatHistorySidebar(firstMsgText) {
      // If conversation exists already, just sync current state maps
      if (conversationsDatabase[currentConvoId]) {
        conversationsDatabase[currentConvoId].messages = [...messages];
        return;
      }

      // Generate a brand new conversation state tree
      conversationsDatabase[currentConvoId] = {
        title: firstMsgText,
        messages: [...messages]
      };

      const historyList = document.getElementById('historyList');
      const historyItem = document.createElement('div');
      historyItem.className = 'history-item active';
      historyItem.id = `item_${currentConvoId}`;
      
      // Setup structural clicks to toggle back into older records
      historyItem.setAttribute('onclick', `loadSavedConversation('${currentConvoId}')`);

      historyItem.innerHTML = `
        <div class="history-text">${escapeHtml(firstMsgText)}</div>
        <button class="history-delete-btn" onclick="deleteConversation(event, '${currentConvoId}')">×</button>
      `;

      // De-activate prior UI items
      document.querySelectorAll('.history-item').forEach(item => item.classList.remove('active'));
      
      // Prepend to top of sidebar stack layout
      historyList.insertBefore(historyItem, historyList.firstChild);
    }

    function loadSavedConversation(convoId) {
      currentConvoId = convoId;
      messages = [...conversationsDatabase[convoId].messages];

      document.querySelectorAll('.history-item').forEach(item => item.classList.remove('active'));
      document.getElementById(`item_${convoId}`).classList.add('active');

      const innerContainer = document.getElementById('messagesInner');
      innerContainer.innerHTML = '';

      messages.forEach(msg => {
        const row = document.createElement('div');
        row.className = `message-row ${msg.role}`;
        row.innerHTML = `
          <div class="message-content">
            <div class="message-sender">${msg.role === 'user' ? 'You' : 'TalkAI'}</div>
            <div>${escapeHtml(msg.content)}</div>
          </div>
        `;
        innerContainer.appendChild(row);
      });
      scrollToBottom();
    }

    function deleteConversation(event, convoId) {
      event.stopPropagation(); // Avoid triggering parent loadSavedConversation click routine
      const item = document.getElementById(`item_${convoId}`);
      if (item) {
        item.remove();
        delete conversationsDatabase[convoId];
        // If user deleted the chat they are currently view pane reading, initialize refresh
        if (currentConvoId === convoId) {
          startNewChat();
        }
      }
    }

    function scrollToBottom() {
      const viewport = document.getElementById('messagesViewport');
      viewport.scrollTop = viewport.scrollHeight;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    // Auto-grow input textarea logic height tracking adjustments
    const tx = document.getElementById('chatInput');
    tx.setAttribute('style', 'height:' + (tx.scrollHeight) + 'px;overflow-y:hidden;');
    tx.addEventListener("input", OnInput, false);
    function OnInput() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    }
  </script>
</body>
</html>
